<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7. Sınıf Matematik | Ali Uludağ</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1976d2; --success: #4caf50; --error: #f44336; --bg: #f0f4f8; }
        
        * { 
            box-sizing: border-box; 
            font-family: 'Quicksand', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; height: 100dvh;
            width: 100%;
            overflow: hidden; 
            background-color: #1c2833; 
            display: flex; justify-content: center; align-items: center;
        }
        
        #app-wrapper {
            width: 100%;
            max-width: 900px;
            height: 100vh; height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .info-bar { 
            background: white; padding: 12px; 
            font-size: clamp(12px, 2vw, 16px); 
            border-bottom: 2px solid #ddd; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .fs-btn {
            background: #34495e; color: white; border: none; 
            border-radius: 8px; padding: 8px 15px; 
            font-weight: 700; cursor: pointer; font-size: clamp(12px, 1.5vw, 16px);
        }
        .fs-btn:active { background: #2c3e50; }
        
        #game-container { 
            flex: 1; display: flex; flex-direction: column; 
            padding: clamp(10px, 3vw, 30px); gap: clamp(10px, 2vw, 20px); 
            overflow: hidden;
        }
        
        .card { 
            background: white; border-radius: 20px; 
            padding: clamp(15px, 3vw, 30px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center;
        }
        
        #topic-screen, #difficulty-screen, #play-screen, #game-over { 
            display: none; flex-direction: column; height: 100%;
        }
        #topic-screen { display: flex; }

        .topic-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; margin: 20px 0;
        }
        
        .t-btn { 
            padding: clamp(12px, 2vw, 20px) 5px; background: #e3f2fd; 
            border: 3px solid #bbdefb; border-radius: 15px; 
            font-size: clamp(13px, 2vw, 18px); font-weight: 700; 
            color: #1565c0; cursor: pointer;
        }
        .t-btn.active { background: var(--primary); color: white; border-color: #0d47a1; }

        .diff-btn { 
            width: 100%; padding: clamp(15px, 3vw, 25px); margin: 10px 0; 
            border: none; border-radius: 15px; 
            font-weight: 700; font-size: clamp(18px, 3vw, 24px); 
            color: white; cursor: pointer; 
        }
        .easy { background: #66bb6a; } .mid { background: #ffa726; } .hard { background: #ef5350; }

        .stats-row { 
            display: flex; justify-content: space-between; 
            align-items: center; font-weight: 700; 
            font-size: clamp(16px, 3vw, 24px); margin-bottom: 10px;
        }
        
        .question-area { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; min-height: 150px;
        }
        
        .question-text { font-size: clamp(32px, 8vw, 60px); font-weight: 800; margin: 20px 0; color: #222; }
        
        .answer-box { 
            height: clamp(60px, 10vw, 90px); background: #f8f9fa; 
            border: 4px solid #eceff1; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: clamp(28px, 6vw, 45px); font-weight: 700; color: var(--primary);
        }

        .keyboard { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: clamp(6px, 1.5vw, 15px); padding-top: 15px; flex-shrink: 0;
        }
        
        .key { 
            background: white; border: none; 
            border-bottom: 5px solid #ccc; padding: clamp(12px, 2.5vw, 25px) 0; 
            font-size: clamp(20px, 4vw, 30px); font-weight: 700; 
            border-radius: 15px; cursor: pointer;
        }
        
        .key:active { transform: translateY(3px); border-bottom-width: 2px; }
        .key.special { background: #eceff1; color: var(--primary); }
        .key.enter { 
            background: var(--success); color: white; grid-column: span 4; 
            border-color: #388e3c; margin-top: 8px; font-size: clamp(20px, 3vw, 30px);
        }
        
        #hint-box { font-size: clamp(14px, 2vw, 20px); color: #fbc02d; font-weight: 700; visibility: hidden; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app-wrapper">
        <div class="info-bar">
            <span><b>Ali ULUDAĞ</b> | 7/E NO: 70 | <b>Öğretmen: Ilgım</b></span>
            <button class="fs-btn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>
        </div>

        <div id="game-container">
            
            <div id="topic-screen" class="card">
                <h2 style="margin:0; font-size: clamp(24px, 4vw, 32px);">Konuları Belirle</h2>
                <div class="topic-grid" id="topics-box"></div>
                <button class="diff-btn" onclick="toDiff()" style="background: var(--primary); margin-top: auto;">ONAYLA VE DEVAM ET</button>
            </div>

            <div id="difficulty-screen" class="card">
                <h2 style="font-size: clamp(24px, 4vw, 32px);">Zorluk Seviyesi</h2>
                <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                    <button class="diff-btn easy" onclick="run('easy')">KOLAY (30sn)</button>
                    <button class="diff-btn mid" onclick="run('mid')">ORTA (20sn)</button>
                    <button class="diff-btn hard" onclick="run('hard')">ZOR (12sn)</button>
                </div>
            </div>

            <div id="play-screen">
                <div class="stats-row">
                    <span>PUAN: <span id="score" style="color:var(--primary)">0</span></span>
                    <span><span id="hint-box"></span> <button onclick="showHint()" style="background:none; border:none; font-size:clamp(24px, 4vw, 35px); cursor:pointer;">💡</button> <span id="timer">--</span>s</span>
                </div>
                <div class="question-area card">
                    <div id="q-topic" style="font-size:clamp(12px, 2vw, 18px); color:#aaa; font-weight:700; letter-spacing:1px;">MATEMATİK</div>
                    <div class="question-text" id="q-text">Yükleniyor...</div>
                    <div class="answer-box" id="ans-box"></div>
                </div>
                <div class="keyboard">
                    <button class="key" onclick="t('1')">1</button><button class="key" onclick="t('2')">2</button><button class="key" onclick="t('3')">3</button><button class="key special" onclick="t('x')">x</button>
                    <button class="key" onclick="t('4')">4</button><button class="key" onclick="t('5')">5</button><button class="key" onclick="t('6')">6</button><button class="key special" onclick="t('y')">y</button>
                    <button class="key" onclick="t('7')">7</button><button class="key" onclick="t('8')">8</button><button class="key" onclick="t('9')">9</button><button class="key special" onclick="t('-')">-</button>
                    <button class="key" style="color:var(--error)" onclick="t('del')">←</button><button class="key" onclick="t('0')">0</button><button class="key special" onclick="t('/')">/</button><button class="key special" onclick="t('z')">z</button>
                    <button class="key enter" onclick="check()">CEVABI GÖNDER</button>
                </div>
            </div>

            <div id="game-over" class="card" style="justify-content:center;">
                <h1 style="color:var(--primary); font-size:clamp(40px, 8vw, 60px); margin:0;">SÜRE DOLDU!</h1>
                <p style="font-size:clamp(24px, 4vw, 35px);">Toplam Puan: <strong><span id="final-score">0</span></strong></p>
                <button class="diff-btn easy" onclick="location.reload()">MENÜYE DÖN</button>
            </div>
        </div>
    </div>

    <script>
        // PC Klavyesi Engeli
        document.addEventListener('keydown', e => {
            const allowed = ['F5', 'F12', 'F11'];
            if(!allowed.includes(e.key)) e.preventDefault();
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Gelişmiş Tam Ekran Giriş/Çıkış Sistemi
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Tam ekran engellendi: " + err.message);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        const topics = ["Tam Sayılar", "Rasyonel Sayılar", "Cebirsel İfadeler", "Denklemler", "Yüzdeler", "Açılar"];
        let selected = [...topics], score = 0, correct = "", current = "", timeLeft = 20, timer, diff = 'mid';
        let lastQuestionText = ""; // Üst üste aynı soru gelmemesi için

        const tBox = document.getElementById('topics-box');
        topics.forEach(title => {
            const btn = document.createElement('div');
            btn.className = 't-btn active'; btn.innerText = title;
            btn.onclick = () => {
                btn.classList.toggle('active');
                if(btn.classList.contains('active')) selected.push(title);
                else selected = selected.filter(s => s !== title);
            };
            tBox.appendChild(btn);
        });

        function toDiff() {
            if(selected.length === 0) return alert("En az 1 konu seçmelisin!");
            document.getElementById('topic-screen').style.display = 'none';
            document.getElementById('difficulty-screen').style.display = 'flex';
        }

        function run(d) {
            diff = d;
            document.getElementById('difficulty-screen').style.display = 'none';
            document.getElementById('play-screen').style.display = 'flex';
            generate();
        }

        function t(val) {
            if(val === 'del') current = current.slice(0, -1);
            else if(current.length < 15) current += val;
            document.getElementById('ans-box').innerText = current;
        }

        function generate() {
            current = ""; document.getElementById('ans-box').innerText = "";
            document.getElementById('hint-box').style.visibility = "hidden";
            
            let qStr = "";
            let ansStr = "";
            let topic = "";
            let safeLoop = 0;

            // Sonsuz döngü: Üst üste aynı soru gelirse tekrar üretir (Maks 20 deneme)
            do {
                topic = selected[Math.floor(Math.random() * selected.length)];
                
                // Zorluğa göre tavan sayılar artırıldı
                let maxA = diff === 'hard' ? 60 : (diff === 'mid' ? 25 : 10);
                let maxB = diff === 'hard' ? 40 : (diff === 'mid' ? 15 : 8);
                
                let a = Math.floor(Math.random() * maxA) + 2;
                let b = Math.floor(Math.random() * maxB) + 2;

                if(topic === "Cebirsel İfadeler") {
                    if (diff === 'hard' && Math.random() > 0.5) {
                        ansStr = (-a - b) + "x";
                        qStr = `-${a}x - ${b}x`; // Negatif sonuçlu cebirsel
                    } else {
                        ansStr = (a - b) + "x";
                        qStr = `(${a}x) - ${b}x`;
                    }
                } else if(topic === "Yüzdeler") {
                    // Zorluk seviyesine göre farklı yüzdeler
                    let base = diff === 'hard' ? a * 25 : (diff === 'mid' ? a * 10 : a * 5);
                    let percent = diff === 'hard' ? (Math.random() > 0.5 ? 40 : 60) : (diff === 'mid' ? 20 : 10);
                    ansStr = Math.floor((base * percent) / 100);
                    qStr = `${base}'in %${percent}'si`;
                } else if(topic === "Açılar") {
                    let angle = diff === 'hard' ? (a*2 + 15) : (diff === 'mid' ? a*3 : a*2);
                    if (angle >= 180) angle = (angle % 150) + 10;
                    ansStr = 180 - angle;
                    qStr = `${angle}° Bütünleri?`;
                } else if(topic === "Tam Sayılar") {
                    if (diff === 'hard') {
                        ansStr = -a - b;
                        qStr = `-${a} - ${b}`;
                    } else if (diff === 'mid') {
                        ansStr = a - (b * 2);
                        qStr = `${a} - ${b*2}`;
                    } else {
                        ansStr = a + b;
                        qStr = `${a} + ${b}`;
                    }
                } else {
                    // Rasyonel Sayılar veya Denklemler için genel matematik
                    if (diff === 'hard') {
                        ansStr = a * b;
                        qStr = `${a} x ${b}`;
                    } else {
                        ansStr = a + b;
                        qStr = `${a} + ${b}`;
                    }
                }
                safeLoop++;
            } while (qStr === lastQuestionText && safeLoop < 20);

            lastQuestionText = qStr;
            correct = ansStr.toString();
            
            document.getElementById('q-topic').innerText = topic;
            document.getElementById('q-text').innerText = qStr;
            clock();
        }

        function check() {
            if(current === correct) {
                score += (diff === 'easy' ? 10 : (diff === 'mid' ? 20 : 40));
                document.getElementById('score').innerText = score;
                generate();
            } else {
                const b = document.getElementById('ans-box');
                b.style.color = "var(--error)";
                setTimeout(() => { b.style.color = "var(--primary)"; current = ""; b.innerText = ""; }, 300);
            }
        }

        function showHint() {
            const h = document.getElementById('hint-box');
            h.innerText = "[" + correct + "]"; h.style.visibility = "visible";
            setTimeout(() => h.style.visibility = "hidden", 800);
        }

        function clock() {
            clearInterval(timer);
            timeLeft = (diff === 'easy' ? 30 : (diff === 'mid' ? 20 : 12));
            document.getElementById('timer').innerText = timeLeft;
            timer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('play-screen').style.display = 'none';
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                }
            }, 1000);
        }
    </script>
</body>
                    </html>
